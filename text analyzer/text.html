<!DOCTYPE html>
<html>
<head>
    <title>Text Analysis Tool</title>
    <style>
        textarea {
            width: 100%;
            height: 150px;
            font-size: 16px;
        }
        .result {
            margin-top: 15px;
            padding: 10px;
            border: 2px solid #333;
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<h2>Text Analysis Tool</h2>


<textarea id="textInput" placeholder="Enter your text here..."></textarea>

<br><br>

<button onclick="analyzeText()">Analyze Text</button>

<div id="output" class="result"></div>

<script>
function analyzeText() {
    var text = document.getElementById("textInput").value;
    var output = document.getElementById("output");


    if (text.trim() === "") {
        output.innerHTML = "Please enter some text.";
        return;
    }

    var charCount = text.length;

   
    var wordsArray = text.trim().split(" ");

   
    var wordCount = 0;
    for (var i = 0; i < wordsArray.length; i++) {
        if (wordsArray[i] !== "") {
            wordCount++;
        }
    }

    
    var reversedText = text.split("").reverse().join("");

    output.innerHTML =
        "<b>Total Characters:</b> " + charCount + "<br>" +
        "<b>Total Words:</b> " + wordCount + "<br>" +
        "<b>Reversed Text:</b><br>" + reversedText;
}
</script>

</body>
</html>
